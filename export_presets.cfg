[preset.3]

name="Android"
platform="Android"
runnable=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/alpha-v0.0.3/android/Camiel-alpha-v0.0.3.apk"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.3.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=0
binary_format/embed_pck=true
binary_format/architecture="arm64-v8a"
## Android minimum SDK 24 = Android 7.0 — covers 99%+ of active devices
android/min_sdk=24
## Target SDK 34 = Android 14 for Google Play target requirements
android/target_sdk=34
## Prevent long-press → right-click conflict with TouchScreenButton nodes
android/enable_long_press_as_right_click=false
## Disable swipe-to-dismiss notification bar (avoids accidental game pause)
android/gesture/swipe_to_dismiss="no"
## Permissions
android/permissions/bind_input=true
## App identity
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/file_version="0.0.3.0"
application/product_version="0.0.3.0"
application/company_name="Euraika"
application/product_name="Camiel"
application/file_description="Camiel alpha-v0.0.3"
application/copyright="© 2026 Euraika"
application/trademarks=""
## Keystore — fill in before exporting. Never commit real keys to source control.
## To generate a debug keystore:
##   keytool -genkey -v -keystore camiel.keystore -alias camiel -keyalg RSA -keysize 2048 -validity 10000
android/keystore/publish=""
android/keystore/debug=""
## Architectures — arm64 only (no32-bit, no x86 for emulators)
## x86 omitted: only used by Android emulators, bloats APK size unnecessarily
architectures/arm64-v8a=true
architectures/armeabi-v7a=false
architectures/x86=false
architectures/x86_64=false

