name: Export
on:
  push:
    branches: [main]
  pull_request:
  tags:
    - "v*"
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gobject/godot-action@v3
        with:
          godot-version: 4.6.2
      - name: Quality Gate
        run: godot --headless --path . --script res://scripts/tools/verify_camiel_resources.gd
      - name: Export Windows
        run: |
          mkdir -p builds/$GITHUB_REF_NAME/windows
          godot --headless --path . --export-release "Windows Desktop" builds/$GITHUB_REF_NAME/windows/Camiel.exe
      - name: Package
        run: cd builds/$GITHUB_REF_NAME/windows && zip -r Camiel-windows.zip Camiel.exe
      - uses: actions/upload-artifact@v4
        with:
          name: camiel-windows-$GITHUB_REF_NAME
          path: builds/$GITHUB_REF_NAME/windows/
      - name: Create Release
        if: startsWith(github.ref, refs/tags/)
        uses: softprops/action-gh-release@v1
        with:
          files: builds/$GITHUB_REF_NAME/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
