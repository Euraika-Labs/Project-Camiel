name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Project Camiel.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and simply.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the game
        2. Press ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: alpha-v0.0.1
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
